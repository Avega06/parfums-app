<div
  class="w-full h-full p-4 rounded-box backdrop-blur-sm border border-base-200 shadow-sm"
  [ngClass]="{
    'bg-base-100/50': themeStore.theme() === 'chadmax',
    'bg-base-300': themeStore.theme() === 'light',
  }"
>
  @if (history().length > 0) {
    <div class="w-full">
      <div class="user-select-none touch-none">
        <div id="chart">
          <apx-chart
            [series]="series()"
            [chart]="chartOptions().chart!"
            [xaxis]="chartOptions().xaxis!"
            [yaxis]="chartOptions().yaxis!"
            [stroke]="chartOptions().stroke!"
            [tooltip]="chartOptions().tooltip!"
            [dataLabels]="chartOptions().dataLabels!"
            [fill]="chartOptions().fill!"
            [grid]="chartOptions().grid!"
            [colors]="chartOptions().colors!"
            [theme]="chartOptions().theme!"
          ></apx-chart>
        </div>
      </div>
    </div>
  } @else {
    <div
      class="flex flex-col items-center justify-center h-64 text-base-content/50 gap-2"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-10 h-10 opacity-50"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"
        />
      </svg>
      <p class="text-sm font-medium">Sin historial de precios disponible</p>
    </div>
  }
</div>
