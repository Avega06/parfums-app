<label
  for="mobile_drawer"
  aria-label="close sidebar"
  class="drawer-overlay"
></label>

<ul class="menu bg-base-200 min-h-full w-80 z-999 gap-2 p-4">
  <div class="flex justify-between items-center mb-4 p-2 lg:hidden">
    <div class="flex flex-row items-center gap-2">
      <div class="avatar">
        <div
          class="ring-primary ring-offset-base-100 w-8 rounded-full ring-2 ring-offset-2"
        >
          <img
            [ngSrc]="userStore.userAvatar()!"
            width="32"
            height="32"
            alt="User Avatar"
            priority
          />
        </div>
      </div>
      <span class="font-bold text-sm"
        >{{userStore.userMetadata()['full_name']}}</span
      >
    </div>
    <div class="flex flex-row justify-center items-center gap-1">
      <theme-controller />
      <label for="mobile_drawer" class="font-bold btn btn-sm btn-circle">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="size-5"
        >
          <path
            d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"
          />
        </svg>
      </label>
    </div>
  </div>
  <div>
    <products-finder />
  </div>
  <div class="flex flex-col py-3 items-center justify-center">
    <li>
      <a href="">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="size-5"
        >
          <path
            fill-rule="evenodd"
            d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-5.5-2.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0ZM10 12a5.99 5.99 0 0 0-4.793 2.39A6.483 6.483 0 0 0 10 16.5a6.483 6.483 0 0 0 4.793-2.11A5.99 5.99 0 0 0 10 12Z"
            clip-rule="evenodd"
          />
        </svg>
        <span>Mi Cuenta</span>
      </a>
    </li>
    <li>
      <a
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="size-5"
        >
          <path
            fill-rule="evenodd"
            d="M6 5v1H4.667a1.75 1.75 0 0 0-1.743 1.598l-.826 9.5A1.75 1.75 0 0 0 3.84 19H16.16a1.75 1.75 0 0 0 1.743-1.902l-.826-9.5A1.75 1.75 0 0 0 15.333 6H14V5a4 4 0 0 0-8 0Zm4-2.5A2.5 2.5 0 0 0 7.5 5v1h5V5A2.5 2.5 0 0 0 10 2.5ZM7.5 10a2.5 2.5 0 0 0 5 0V8.75a.75.75 0 0 1 1.5 0V10a4 4 0 0 1-8 0V8.75a.75.75 0 0 1 1.5 0V10Z"
            clip-rule="evenodd"
          />
        </svg>
        <span>Mis Productos</span>
      </a>
    </li>
    <li class="text-red-600">
      <a
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="size-5"
        >
          <path
            fill-rule="evenodd"
            d="M3 4.25A2.25 2.25 0 0 1 5.25 2h5.5A2.25 2.25 0 0 1 13 4.25v2a.75.75 0 0 1-1.5 0v-2a.75.75 0 0 0-.75-.75h-5.5a.75.75 0 0 0-.75.75v11.5c0 .414.336.75.75.75h5.5a.75.75 0 0 0 .75-.75v-2a.75.75 0 0 1 1.5 0v2A2.25 2.25 0 0 1 10.75 18h-5.5A2.25 2.25 0 0 1 3 15.75V4.25Z"
            clip-rule="evenodd"
          />
          <path
            fill-rule="evenodd"
            d="M6 10a.75.75 0 0 1 .75-.75h9.546l-1.048-.943a.75.75 0 1 1 1.004-1.114l2.5 2.25a.75.75 0 0 1 0 1.114l-2.5 2.25a.75.75 0 1 1-1.004-1.114l1.048-.943H6.75A.75.75 0 0 1 6 10Z"
            clip-rule="evenodd"
          />
        </svg>
        <span>Cerrar Session</span></a
      >
    </li>
  </div>
</ul>
