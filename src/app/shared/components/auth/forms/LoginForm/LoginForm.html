<form [formRoot]="loginForm" class="space-y-4">
  <form-input
    [formField]="loginForm.email"
    type="email"
    placeholder="Tu email"
    formClass="input input-bordered placeholder:text-white/90 placeholder:font-bold w-full font-bold bg-white/10 border-white/20 text-white focus:border-white/40"
    [errors]="loginForm.email().errors()"
    [isTouched]="loginForm.email().touched()"
  />

  <div class="relative">
    <form-input
      [formField]="loginForm.password"
      type="password"
      placeholder="Contraseña"
      formClass="input input-bordered placeholder:text-white/90 placeholder:font-bold w-full font-bold bg-white/10 border-white/20 text-white focus:border-white/40"
      [errors]="loginForm.password().errors()"
      [isTouched]="loginForm.password().touched()"
    />
  </div>
  <button
    type="submit"
    class="btn btn-neutral w-full bg-black border-none text-white"
  >
    Acceder
  </button>
</form>
