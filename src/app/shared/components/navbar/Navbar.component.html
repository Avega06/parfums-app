<div
  class="sticky navbar top-0 z-30 w-full bg-base-100 shadow-sm shadow-base-300 px-4 flex items-center justify-between h-16"
>
  <!-- Menú hamburguesa / Logo -->
  <div class="navbar-start flex items-center gap-2">
    <!-- Logo -->
    <div class="min-w-[35%] tablet:max-w-[27%] pl-2 logo-container">
      <!-- Logo para Tema Claro -->
      <img
        [routerLink]="['/']"
        class="w-full logo mt-2.5 logo-light object-center cursor-pointer"
        src="/logo-light-transparent-v2.png"
        alt="Logo de la aplicación (Claro)"
      />
      <!-- Logo para Tema Oscuro/Chadmax -->
      <img
        [routerLink]="['/']"
        class="w-full logo logo-coffee object-center cursor-pointer"
        src="/logo-dark-transparent-v2.png"
        alt="Logo de la aplicación (Oscuro)"
      />
    </div>
  </div>

  <div class="flex-none lg:hidden">
    <label
      for="mobile_drawer"
      aria-label="open sidebar"
      class="btn btn-square btn-ghost"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        class="inline-block h-6 w-6 stroke-current"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        ></path>
      </svg>
    </label>
  </div>

  <!-- El resto de tu navbar permanece igual... -->
  <div class="navbar-center hidden lg:flex flex-col gap-1">
    <!-- Buscador Desktop -->
    <div class="relative w-160">
      <products-finder />
    </div>
  </div>

  <div class="navbar-end gap-2 hidden lg:flex">
    <!-- Iconos Desktop -->

    <button class="btn btn-ghost btn-circle">
      <theme-controller />
    </button>
    @if (!userStore.isAuthenticated()) {
      <user-dropdown />
    } @else {
      <user-avatar
        [userInfo]="userStore.userMetadata()!"
        [isAvatarLoading]="userStore.isLoading()"
      />
    }
  </div>
</div>
