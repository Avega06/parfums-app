<div [attr.data-theme]="messages_theme()" class="z-[999]">
  <div class="drawer drawer-end">
    <input
      id="chat-drawer"
      type="checkbox"
      class="drawer-toggle"
      [checked]="!isMinimize()"
    />

    <div class="drawer-content">
      @if (isMinimize()) {
      <label
        for="chat-drawer"
        class="avatar indicator btn tooltip-left btn-primary fixed bottom-6 right-6 rounded-full p-0 w-28 h-28 shadow-xl z-[1000] hover:scale-105 transition-all border-none"
        [class.tooltip]="isMinimize()"
        data-tip="¿Más detalles de este perfume? El olfato de Paco te los explica"
      >
        <span class="indicator-item badge badge-secondary badge-lg border-none"
          >AI</span
        >
        <img
          src="paco.ico"
          alt="Paco"
          class="w-full h-full object-contain ring-3 ring-amber-500 rounded-full bg-base-100 p-1"
        />
      </label>
      }
    </div>

    <div class="drawer-side z-[1001] font-geistPixel font-bold">
      <label
        for="chat-drawer"
        aria-label="close sidebar"
        class="drawer-overlay"
      ></label>

      <div
        class="flex flex-col w-full md:w-[700px] h-full bg-base-100 text-base-content shadow-2xl border-l border-white/5"
      >
        <div
          class="p-4 border-b border-white/5 flex justify-between items-center bg-base-100"
        >
          <div class="flex items-center gap-3">
            <img
              srcset="/paco.ico"
              width="45"
              alt="Paco"
              class="rounded-full"
            />
            <div>
              <span class="text-2xl font-black text-primary block leading-none"
                >Paco Chatbot</span
              >
              <span class="text-[10px] opacity-50 uppercase tracking-widest"
                >Experto en Fragancias</span
              >
            </div>
          </div>

          <button
            class="btn btn-circle btn-sm btn-ghost opacity-50 hover:opacity-100"
            (click)="handleMinimize()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="1.2em"
              height="1.2em"
              viewBox="0 0 24 24"
            >
              <path
                fill="currentColor"
                d="M6.4 19L5 17.6l5.6-5.6L5 6.4L6.4 5l5.6 5.6L17.6 5L19 6.4L13.4 12l5.6 5.6l-1.4 1.4l-5.6-5.6z"
              />
            </svg>
          </button>
        </div>

        <div
          #messagesContainer
          class="flex-1 overflow-y-auto p-4 space-y-4 bg-base-200/20 text-sm font-sans font-medium"
        >
          @for (msg of messages(); track $index) { @if (msg.text.length >= 1) {
          <div
            class="chat"
            [class.chat-start]="msg.role === 'agent'"
            [class.chat-end]="msg.role === 'user'"
          >
            <div class="chat-image avatar">
              <div class="w-10 rounded-full border border-primary/10">
                <img
                  [src]="msg.role === 'agent' ? 'paco.ico' : userStore.userAvatar()"
                />
              </div>
            </div>
            <div
              class="chat-bubble shadow-md w-fit max-w-[85%] break-words"
              [class.chat-bubble-primary]="msg.role === 'user'"
              [class.chat-bubble-neutral]="msg.role === 'agent'"
            >
              <div
                class="prose prose-sm max-w-none dark:prose-invert break-words"
              >
                <markdown [data]="msg.text"></markdown>
              </div>
            </div>
          </div>
          } } @if (loading()) {
          <div class="chat chat-start">
            <div
              class="chat-bubble chat-bubble-neutral flex gap-3 items-center italic opacity-80 py-4"
            >
              <span class="loading loading-ring loading-md text-primary"></span>
              Paco está analizando las notas del perfume...
            </div>
          </div>
          }
        </div>

        <form
          class="p-4 border-t border-white/5 bg-base-100 flex gap-2"
          (submit)="send($event)"
        >
          <textarea
            autoGrow
            class="textarea input-bordered min-h-[48px] max-h-[150px] h-auto flex-1 focus:outline-none focus:border-primary bg-base-200 text-sm resize-none overflow-y-auto"
            placeholder="Pregúntale a Paco..."
            [value]="input()"
            (input)="input.set($any($event.target).value)"
          ></textarea>
          <button
            class="btn btn-primary h-12 px-4 shadow-md"
            type="submit"
            [disabled]="loading() || !input()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="1.2em"
              height="1.2em"
              viewBox="0 0 24 24"
            >
              <path
                fill="currentColor"
                d="M2.01 21L23 12L2.01 3L2 10l15 2l-15 2z"
              />
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
