<div class="relative">
  @if(type() === 'password'){
  <div class="tooltip block tooltip-right relative">
    @if(isPasswordInfo() && isFocussed()){
    <div
      class="tooltip-content justify-center p-3 w-64 data-[state=open]:block"
    >
      <ul class="space-y-2">
        @for(info of passwordInfo(); track info){
        <p class="flex items-start gap-2 text-xs break-words">
          @if (!info.valid) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            class="size-4 text-red-800 shrink-0 mt-0.5"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z"
              clip-rule="evenodd"
            />
          </svg>
          }@else{
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            class="size-4 text-green-500 shrink-0 mt-0.5"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z"
              clip-rule="evenodd"
            />
          </svg>
          }
          <span>{{info.message}}</span>
        </p>
        }
      </ul>
    </div>
    }

    <input
      [type]="showPassword() ? 'text' : 'password'"
      [placeholder]="placeholder()"
      [formField]="formField()"
      [classList]="formClass()"
      (focus)="isFocussed.set(true)"
      (blur)="isFocussed.set(false)"
    />

    <button
      type="button"
      (click)="toggleVisibility()"
      class="btn btn-ghost text-blue-300 btn-xs absolute right-2 top-2"
    >
      @if(showPassword()){
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 20 20"
        fill="currentColor"
        class="size-4.5"
      >
        <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
        <path
          fill-rule="evenodd"
          d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z"
          clip-rule="evenodd"
        />
      </svg>
      }@else {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 20 20"
        fill="currentColor"
        class="size-4.5"
      >
        <path
          fill-rule="evenodd"
          d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l14.5 14.5a.75.75 0 1 0 1.06-1.06l-1.745-1.745a10.029 10.029 0 0 0 3.3-4.38 1.651 1.651 0 0 0 0-1.185A10.004 10.004 0 0 0 9.999 3a9.956 9.956 0 0 0-4.744 1.194L3.28 2.22ZM7.752 6.69l1.092 1.092a2.5 2.5 0 0 1 3.374 3.373l1.091 1.092a4 4 0 0 0-5.557-5.557Z"
          clip-rule="evenodd"
        />
        <path
          d="m10.748 13.93 2.523 2.523a9.987 9.987 0 0 1-3.27.547c-4.258 0-7.894-2.66-9.337-6.41a1.651 1.651 0 0 1 0-1.186A10.007 10.007 0 0 1 2.839 6.02L6.07 9.252a4 4 0 0 0 4.678 4.678Z"
        />
      </svg>
      }
    </button>
  </div>
  }@else {
  <input
    [type]="type()"
    [placeholder]="placeholder()"
    [formField]="formField()"
    [class]="formClass()"
  />
  }
</div>

<ul class="list ml-2">
  @for(error of errors(); track error){ @if(isTouched() && isInvalidField()){
  <li class="text-sm font-bold mt-1 text-error">{{error.message}}</li>
  } }
</ul>
