<ul
  class="list flex flex-col justify-between absolute mt-1.5 w-70 tablet:w-full bg-base-100 shadow rounded-box z-30 max-h-60 overflow-y-auto"
>
  @if (products().length > 0) {
  <li class="p-4 pb-2 text-xs font-semibold opacity-60 tracking-wide">
    Resultados de la búsqueda:
  </li>

  @for (product of encodedProducts(); track product.id) {
  <li class="list-row">
    <label
      [attr.for]="isMobile() ? 'mobile_drawer' : null"
      aria-label="close sidebar"
      class="w-full cursor-pointer block"
      (click)="goToProduct(product.encodedName)"
    >
      <div>
        <div class="text-xs uppercase font-semibold opacity-60">
          {{ product.shop }}:
        </div>
        <div class="text-md font-semibold hover:underline">
          {{ product.name }}
        </div>
      </div>
    </label>
  </li>
  } } @else {
  <li class="p-4 pb-2 text-xs opacity-60 tracking-wide">
    No se encontraron resultados
  </li>
  }
</ul>
