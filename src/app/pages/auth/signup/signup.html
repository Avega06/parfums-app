<div class="w-full flex items-center justify-center p-4">
  <div
    class="card w-full max-w-md bg-white/20 backdrop-blur-xl border border-white/30 shadow-2xl text-neutral-content p-8"
  >
    <h2 class="text-3xl font-bold text-white text-center mb-2">
      Registrar una cuenta
    </h2>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="flex gap-2">
        <input
          type="text"
          placeholder="Nombre"
          [(ngModel)]="form().firstName"
          name="firstName"
          class="input input-bordered font-bold w-full bg-white/10 border-white/20 text-white placeholder:text-white/60"
        />
        <input
          type="text"
          placeholder="Apellido"
          [(ngModel)]="form().lastName"
          name="lastName"
          class="input input-bordered w-full font-bold bg-white/10 border-white/20 text-white placeholder:text-white/60"
        />
      </div>

      <input
        type="email"
        placeholder="Tu email"
        [(ngModel)]="form().email"
        name="email"
        class="input input-bordered w-full font-bold bg-white/10 border-white/20 text-white"
      />

      <input
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="form().password"
        name="password"
        class="input input-bordered w-full font-bold bg-white/10 border-white/20 text-white"
      />

      <input
        type="password"
        placeholder="Confirmar Contraseña"
        [(ngModel)]="form().confirmPassword"
        name="confirmPassword"
        class="input input-bordered font-bold w-full bg-white/10 border-white/20 text-white"
      />

      <div class="form-control">
        <!-- <label class="label cursor-pointer justify-start gap-3">
              <input
                type="checkbox"
                class="checkbox checkbox-sm border-white/40"
              />
              <span class="label-text text-white/80"
                >Sign up for newsletter</span
              >
            </label> -->
      </div>

      <button
        type="submit"
        class="btn btn-neutral w-full bg-black hover:bg-black/80 border-none text-white"
      >
        Crear cuenta
      </button>
    </form>

    <div class="divider font-bold text-white text-xs">
      Tambien puedes registrarte mediante
    </div>

    <social-buttons />

    <p class="text-center text-xs text-white/60 mt-6">
      By creating an account, you agree to our
      <a class="underline cursor-pointer">Terms & Service</a>
    </p>
  </div>
</div>
