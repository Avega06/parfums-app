<div class="w-full flex items-center justify-center p-4">
  <div
    class="card w-full max-w-md bg-white/20 backdrop-blur-xl border border-white/30 shadow-2xl p-8"
  >
    <h2 class="text-3xl font-bold text-white text-center mb-6">
      Bienvenido de nuevo
    </h2>

    <form (ngSubmit)="onLogin()" class="space-y-4">
      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        class="input input-bordered w-full bg-white/10 border-white/20 text-white"
      />
      <input
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="password"
        name="password"
        class="input input-bordered w-full bg-white/10 border-white/20 text-white"
      />

      <button
        type="submit"
        class="btn btn-neutral w-full bg-black border-none text-white"
      >
        Acceder
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="text-white/70 text-sm">
        ¿No tienes cuenta?
        <a
          routerLink="/auth/signup"
          class="text-white font-bold hover:underline"
          >Regístrate</a
        >
      </p>
    </div>

    <div class="divider text-white text-xs">O accede mediante</div>

    <social-buttons />
  </div>
</div>
