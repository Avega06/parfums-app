<div
  class="w-full min-h-screen flex items-center justify-center p-4 box-border"
>
  <div
    class="card w-full max-w-sm sm:max-w-md bg-white/20 backdrop-blur-xl border border-white/30 shadow-2xl p-6 sm:p-8"
  >
    <h2 class="text-2xl sm:text-3xl font-bold text-white text-center mb-6">
      Bienvenido de nuevo
    </h2>

    <form [formRoot]="loginForm" class="space-y-4">
      <input
        type="email"
        placeholder="Email"
        [formField]="loginForm.email"
        class="input input-bordered w-full bg-white/10 border-white/20 text-white focus:border-white/40"
      />
      <input
        type="password"
        placeholder="Contraseña"
        [formField]="loginForm.password"
        class="input input-bordered w-full bg-white/10 border-white/20 text-white focus:border-white/40"
      />

      <button
        type="submit"
        class="btn btn-neutral w-full bg-black border-none text-white"
      >
        Acceder
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="text-white/70 text-sm">
        ¿No tienes cuenta?
        <a
          routerLink="/auth/signup"
          class="text-white font-bold hover:underline"
          >Regístrate</a
        >
      </p>
    </div>

    <div class="divider text-white text-xs">O accede mediante</div>

    <social-buttons />
  </div>
</div>
