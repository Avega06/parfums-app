<div
  class="min-h-screen text-slate-200 w-full overflow-x-hidden p-4 tablet:p-10"
>
  <div
    class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start"
  >
    <div class="lg:col-span-5 w-full">
      <div
        class="card bg-white shadow-2xl rounded-[2.5rem] p-6 tablet:p-12 relative overflow-hidden"
      >
        <div class="absolute top-6 z-29 left-6">
          <span
            class="badge badge-outline border-slate-200 text-slate-400 font-bold px-4 py-3 text-xs uppercase tracking-widest"
          >
            {{ product()!.type }}
          </span>
        </div>

        <product-image
          [imageSrc]="product()!.imageUrl"
          [imageName]="product()!.product"
        />

        @if (showUserButtons()) {
          <div class="flex justify-center gap-4 mt-8">
            <button
              (click)="toggleFavorite()"
              class="btn btn-circle btn-ghost bg-slate-50 hover:bg-red-50 text-slate-400 hover:text-error border-none"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                [class.fill-current]="isFavorite()"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                />
              </svg>
            </button>

            <button
              class="btn btn-circle btn-ghost bg-slate-50 hover:bg-blue-50 text-slate-400 hover:text-primary border-none"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 4v16m8-8H4"
                />
              </svg>
            </button>
            <button
              class="btn btn-circle btn-ghost bg-slate-50 hover:bg-blue-50 text-slate-400 hover:text-primary border-none"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="width: 24px; height: 24px"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                ></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </button>
            <button
              class="btn btn-circle bg-[#26A5E4] hover:bg-[#1e8ec4] text-white border-none shadow-lg shadow-blue-500/20"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.36-.49.99-.75 3.88-1.69 6.46-2.8 7.73-3.35 3.68-1.56 4.44-1.83 4.94-1.84.11 0 .35.03.5.16.13.11.17.26.18.37z"
                />
              </svg>
            </button>
          </div>
        }
      </div>
    </div>

    <div class="lg:col-span-7 flex flex-col gap-6">
      <div class="card bg-[#1a1a1a] shadow-xl">
        <div class="card-body">
          <div class="space-y-1">
            <p
              class="text-primary font-bold text-xs uppercase tracking-[0.2em] mb-2 flex items-center gap-2"
            >
              <span class="w-6 h-[1px] bg-primary"></span>
              {{ product()!.shop }}
            </p>
            <h1
              class="text-3xl tablet:text-5xl font-black text-white leading-tight"
            >
              {{ product()!.product }}
            </h1>
          </div>

          <div class="flex items-center gap-6 mt-6">
            <div class="flex flex-col">
              <span
                class="text-[0.6rem] uppercase font-bold opacity-40 tracking-widest"
                >Precio Hoy</span
              >
              <span class="text-4xl font-black text-white italic">
                {{ product()!.price | currency: "CLP" : "symbol-narrow" }}
              </span>
            </div>
            <a
              [href]="product()!.link"
              target="_blank"
              class="btn btn-primary rounded-2xl flex-1 h-16 text-lg font-bold"
            >
              Ir a la tienda
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                />
              </svg>
            </a>
          </div>
        </div>
      </div>

      <div class="card bg-[#1a1a1a] shadow-xl p-4 flex-row items-center gap-4">
        <div
          class="w-12 h-12 bg-white rounded-lg flex items-center justify-center p-1"
        >
          <img
            [src]="getImageUrl(product()!.shop!)"
            class="object-contain h-full w-full"
          />
        </div>
        <div class="flex-1">
          <h4 class="text-sm font-bold">Distribuidor Oficial</h4>
          <p class="text-[10px] opacity-40 italic">
            Stock verificado recientemente
          </p>
        </div>
        <button
          class="btn btn-ghost btn-circle btn-sm opacity-30"
          (click)="openShopModal()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </button>
      </div>
    </div>
    <div class="lg:col-span-12 flex flex-col gap-6">
      <div class="card bg-[#1a1a1a] shadow-xl">
        <div
          class="p-6 border-b border-white/5 flex justify-between items-center"
        >
          <h3
            class="text-sm font-bold uppercase tracking-widest opacity-60 flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"
              />
            </svg>
            Historial de Precios
          </h3>
          <span class="badge badge-sm badge-neutral"
            >{{ priceHistory().length }} registros</span
          >
        </div>
        <div class="p-6">
          <app-product-price-history-chart [history]="priceHistory()" />
        </div>
      </div>
    </div>
  </div>
</div>
<app-chatbot [productName]="product()!.product" (closeChatbot)="toggle()" />
